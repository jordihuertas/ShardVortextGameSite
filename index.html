<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shard Vortex — A mobile arcade game. Aim and launch balls to destroy falling enemy rows. How long can you last?" />
  <title>Shard Vortex</title>
  <link rel="icon" type="image/png" href="public/images/logo.png" />
  <!-- Tailwind CSS CDN (Play CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'sv-bg':     '#0a0a0f',
            'sv-card':   '#12121c',
            'sv-accent': '#7b2fff',
            'sv-cyan':   '#00e5ff',
            'sv-muted':  '#9090b0',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="bg-sv-bg text-gray-200 overflow-x-hidden">

  <div id="site-header"></div>

  <!-- HERO -->
  <section class="relative min-h-screen flex items-center justify-center text-center overflow-hidden pt-[70px]" id="home">
    <!-- Gradient backgrounds -->
    <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(123,47,255,0.3) 0%, transparent 70%), radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,229,255,0.15) 0%, transparent 60%);"></div>
    <!-- Particle canvas -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
      <canvas id="particlesCanvas" class="absolute inset-0 w-full h-full"></canvas>
    </div>

    <!-- Content -->
    <div class="relative z-10 px-6 py-10 max-w-3xl">
      <img src="public/images/logo.png" alt="Shard Vortex game logo" class="w-28 h-28 md:w-36 md:h-36 object-contain rounded-3xl mx-auto mb-7 animate-float" style="box-shadow: 0 0 60px rgba(123,47,255,0.5), 0 0 120px rgba(123,47,255,0.2);" />
      <h1 class="text-5xl md:text-7xl font-black leading-none tracking-tight gradient-text mb-5">Shard Vortex</h1>
      <p data-i18n-html="hero_subtitle" class="text-sv-muted text-base md:text-xl max-w-xl mx-auto mb-10 leading-relaxed"></p>
      <div class="flex gap-4 justify-center flex-wrap">
        <a href="#screenshots" data-i18n="hero_cta_screenshots" class="inline-flex items-center gap-2 px-8 py-3.5 rounded-full font-semibold text-white transition-all duration-300 hover:-translate-y-0.5 no-underline" style="background: linear-gradient(135deg, #7b2fff, #a855f7); box-shadow: 0 4px 24px rgba(123,47,255,0.45);">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        </a>
        <a href="#about" data-i18n="hero_cta_learn" class="inline-flex items-center gap-2 px-8 py-3.5 rounded-full font-semibold text-gray-200 border-2 border-[rgba(123,47,255,0.25)] hover:border-sv-cyan hover:text-sv-cyan hover:-translate-y-0.5 transition-all duration-300 no-underline"></a>
      </div>
    </div>

    <!-- Scroll indicator -->
    <div class="absolute bottom-8 left-1/2 animate-bounce-slow flex flex-col items-center gap-1.5 text-sv-muted text-xs pointer-events-none" aria-hidden="true">
      <svg class="w-5 h-5" fill="none" stroke="#7b2fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      <span data-i18n="scroll_text"></span>
    </div>
  </section>

  <!-- ABOUT -->
  <section class="py-24 px-6" id="about" style="background: linear-gradient(180deg, #0a0a0f 0%, #0e0e1a 100%);">
    <div class="max-w-6xl mx-auto">

      <!-- Section header -->
      <div class="text-center mb-16 fade-in">
        <span data-i18n="about_eyebrow" class="inline-block text-[0.75rem] font-bold tracking-[0.15em] uppercase text-sv-accent mb-3 px-3.5 py-1 border border-[rgba(123,47,255,0.25)] rounded-full"></span>
        <h2 data-i18n="about_title" class="text-3xl md:text-4xl font-extrabold text-white mb-4"></h2>
        <p data-i18n="about_desc" class="text-sv-muted text-base max-w-xl mx-auto"></p>
      </div>

      <!-- Grid: image + text -->
      <div class="grid md:grid-cols-2 gap-16 items-center">

        <!-- Image -->
        <div class="relative fade-in">
          <div class="absolute inset-[-2px] rounded-xl opacity-40 -z-10" style="background: linear-gradient(135deg, #7b2fff, #00e5ff);"></div>
          <img src="public/images/1.png" alt="Shard Vortex gameplay screenshot" class="rounded-xl w-full object-cover hover:scale-[1.02] transition-transform duration-300" style="border: 1px solid rgba(123,47,255,0.25); box-shadow: 0 20px 60px rgba(0,0,0,0.5);" />
        </div>

        <!-- Text -->
        <div class="fade-in fade-in-delay-1">
          <h3 data-i18n="about_h3" class="text-2xl md:text-3xl font-extrabold text-white mb-4"></h3>
          <p data-i18n="about_p1" class="text-sv-muted text-base mb-4 leading-relaxed"></p>
          <p data-i18n="about_p2" class="text-sv-muted text-base mb-8 leading-relaxed"></p>
          <!-- Feature cards -->
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-1 lg:grid-cols-2 gap-4">
            <div class="flex items-center gap-3 p-4 bg-sv-card rounded-xl border border-[rgba(123,47,255,0.25)] hover:border-sv-accent hover:-translate-y-0.5 transition-all duration-300">
              <span class="text-2xl">&#9889;</span>
              <span data-i18n="feature_1" class="text-sm font-semibold text-white"></span>
            </div>
            <div class="flex items-center gap-3 p-4 bg-sv-card rounded-xl border border-[rgba(123,47,255,0.25)] hover:border-sv-accent hover:-translate-y-0.5 transition-all duration-300">
              <span class="text-2xl">&#x1F300;</span>
              <span data-i18n="feature_2" class="text-sm font-semibold text-white"></span>
            </div>
            <div class="flex items-center gap-3 p-4 bg-sv-card rounded-xl border border-[rgba(123,47,255,0.25)] hover:border-sv-accent hover:-translate-y-0.5 transition-all duration-300">
              <span class="text-2xl">&#x1F48E;</span>
              <span data-i18n="feature_3" class="text-sm font-semibold text-white"></span>
            </div>
            <div class="flex items-center gap-3 p-4 bg-sv-card rounded-xl border border-[rgba(123,47,255,0.25)] hover:border-sv-accent hover:-translate-y-0.5 transition-all duration-300">
              <span class="text-2xl">&#x1F3C6;</span>
              <span data-i18n="feature_4" class="text-sm font-semibold text-white"></span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <!-- SCREENSHOTS -->
  <section class="py-24 px-6 bg-sv-bg" id="screenshots">
    <div class="max-w-6xl mx-auto">

      <!-- Section header -->
      <div class="text-center mb-16 fade-in">
        <span data-i18n="screenshots_eyebrow" class="inline-block text-[0.75rem] font-bold tracking-[0.15em] uppercase text-sv-accent mb-3 px-3.5 py-1 border border-[rgba(123,47,255,0.25)] rounded-full"></span>
        <h2 data-i18n="screenshots_title" class="text-3xl md:text-4xl font-extrabold text-white mb-4"></h2>
        <p data-i18n="screenshots_desc" class="text-sv-muted text-base max-w-xl mx-auto"></p>
      </div>

      <!-- Flowbite Gallery grid -->
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4 fade-in">
        <button class="block rounded-xl overflow-hidden border border-[rgba(123,47,255,0.25)] hover:border-sv-accent hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(123,47,255,0.3)] transition-all duration-300 cursor-pointer focus:outline-none focus:ring-2 focus:ring-sv-accent" data-i18n-attr="aria-label:screenshot_open" data-i18n-n="1"><img src="public/images/1.png" data-i18n-attr="alt:screenshot_img_alt" data-i18n-n="1" loading="lazy" class="h-auto max-w-full" /></button>
        <button class="block rounded-xl overflow-hidden border border-[rgba(123,47,255,0.25)] hover:border-sv-accent hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(123,47,255,0.3)] transition-all duration-300 cursor-pointer focus:outline-none focus:ring-2 focus:ring-sv-accent" data-i18n-attr="aria-label:screenshot_open" data-i18n-n="2"><img src="public/images/2.png" data-i18n-attr="alt:screenshot_img_alt" data-i18n-n="2" loading="lazy" class="h-auto max-w-full" /></button>
        <button class="block rounded-xl overflow-hidden border border-[rgba(123,47,255,0.25)] hover:border-sv-accent hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(123,47,255,0.3)] transition-all duration-300 cursor-pointer focus:outline-none focus:ring-2 focus:ring-sv-accent" data-i18n-attr="aria-label:screenshot_open" data-i18n-n="3"><img src="public/images/3.png" data-i18n-attr="alt:screenshot_img_alt" data-i18n-n="3" loading="lazy" class="h-auto max-w-full" /></button>
        <button class="block rounded-xl overflow-hidden border border-[rgba(123,47,255,0.25)] hover:border-sv-accent hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(123,47,255,0.3)] transition-all duration-300 cursor-pointer focus:outline-none focus:ring-2 focus:ring-sv-accent" data-i18n-attr="aria-label:screenshot_open" data-i18n-n="4"><img src="public/images/4.png" data-i18n-attr="alt:screenshot_img_alt" data-i18n-n="4" loading="lazy" class="h-auto max-w-full" /></button>
        <button class="block rounded-xl overflow-hidden border border-[rgba(123,47,255,0.25)] hover:border-sv-accent hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(123,47,255,0.3)] transition-all duration-300 cursor-pointer focus:outline-none focus:ring-2 focus:ring-sv-accent" data-i18n-attr="aria-label:screenshot_open" data-i18n-n="5"><img src="public/images/5.png" data-i18n-attr="alt:screenshot_img_alt" data-i18n-n="5" loading="lazy" class="h-auto max-w-full" /></button>
        <button class="block rounded-xl overflow-hidden border border-[rgba(123,47,255,0.25)] hover:border-sv-accent hover:-translate-y-1 hover:shadow-[0_12px_40px_rgba(123,47,255,0.3)] transition-all duration-300 cursor-pointer focus:outline-none focus:ring-2 focus:ring-sv-accent" data-i18n-attr="aria-label:screenshot_open" data-i18n-n="6"><img src="public/images/6.png" data-i18n-attr="alt:screenshot_img_alt" data-i18n-n="6" loading="lazy" class="h-auto max-w-full" /></button>
      </div><!-- /gallery -->

    </div>
  </section>

  <!-- Lightbox -->
  <div id="lightbox" class="hidden fixed inset-0 bg-black/90 z-[2000] items-center justify-center" role="dialog" aria-modal="true" aria-label="Image lightbox">
    <button id="lightboxClose" class="absolute top-5 right-5 w-11 h-11 bg-sv-card border border-[rgba(123,47,255,0.25)] rounded-full text-white text-2xl flex items-center justify-center hover:bg-sv-accent transition-all duration-300 cursor-pointer" aria-label="Close lightbox">&times;</button>
    <img id="lightboxImg" class="max-w-[90vw] max-h-[85vh] rounded-xl animate-zoom-in" src="" data-i18n-attr="alt:screenshot_zoom_alt" style="box-shadow: 0 0 80px rgba(123,47,255,0.4);" />
  </div>

  <div id="site-footer"></div>

  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script src="js/partials.js"></script>
</body>
</html>
